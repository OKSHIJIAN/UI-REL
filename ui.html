<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI-REL Design Review</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --bg-elevated: #14141c;
            --bg-surface: #1c1c28;
            --bg-hover: #242436;
            --border: #2a2a3c;
            --border-subtle: #222233;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.25);
            --accent-hover: #7c6ff0;
            --success: #00d68f;
            --success-dim: rgba(0, 214, 143, 0.12);
            --danger: #ff5c5c;
            --danger-dim: rgba(255, 92, 92, 0.12);
            --warning: #ffc048;
            --warning-dim: rgba(255, 192, 72, 0.12);
            --fg: #eaeaf0;
            --fg-secondary: #8888a0;
            --fg-muted: #55556a;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            font-size: 13px;
            line-height: 1.45;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg) 100%);
            flex-shrink: 0;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #a66cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            box-shadow: 0 2px 10px var(--accent-glow);
        }
        .header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            color: var(--accent);
        }
        .header-subtitle {
            font-size: 11px;
            color: var(--fg-muted);
            font-weight: 400;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* ===== SIDEBAR (LEFT) ===== */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            overflow-y: auto;
        }
        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .sidebar-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--fg-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-label::before {
            content: '';
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* Frame Selector Card */
        .frame-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 12px;
            border: 1px solid var(--border);
        }
        .frame-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-glow);
        }
        .frame-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }
        .frame-icon-sm {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), #a66cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        .frame-name-text {
            font-weight: 500;
            font-size: 13px;
            overflow-x: auto;
            white-space: nowrap;
            min-width: 0;
        }
        .frame-name-text::-webkit-scrollbar { height: 0; } /* 隐藏滚动条，保留滚动能力 */
        .frame-dims {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--fg-secondary);
            margin-top: 4px;
        }
        .no-frame {
            color: var(--fg-muted);
            font-style: italic;
            font-size: 12px;
        }
        .btn-select-frame {
            width: 100%;
            margin-top: 10px;
            padding: 9px;
            background: var(--bg-surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius-sm);
            color: var(--fg-secondary);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.18s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-select-frame:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }
        .btn-select-frame.captured {
            border-style: solid;
            border-color: var(--success);
            color: var(--success);
            background: var(--success-dim);
        }
        .btn-select-frame:disabled {
            opacity: 0.6;
            cursor: default;
        }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }
        .upload-zone:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-glow);
            transform: scale(1.01);
        }
        .upload-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 8px;
            color: var(--fg-muted);
        }
        .upload-title {
            font-size: 13px;
            color: var(--fg-secondary);
            font-weight: 500;
        }
        .upload-hint {
            font-size: 11px;
            color: var(--fg-muted);
            margin-top: 4px;
        }
        input[type="file"] { display: none; }

        /* Mini Previews in Sidebar */
        .preview-pair-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            max-height: 45vh;
            overflow-y: auto;
        }
        .preview-pair-item {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 8px;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: transform 0.25s ease, opacity 0.2s ease, background 0.15s ease, border-color 0.15s ease;
            align-items: start;
            position: relative;
            touch-action: pan-x;
        }
        .preview-pair-item:hover { border-color: var(--border); background: var(--bg-hover); }
        .preview-pair-item.active {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 1px var(--accent-glow), 0 2px 12px rgba(108,92,231,0.12);
        }

        /* 滑动删除状态 */
        .preview-pair-item.swiping { transition: none; }
        .preview-pair-item.slide-out {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            transition: transform 0.28s cubic-bezier(.4,0,.2,1), opacity 0.22s ease;
        }
        .preview-pair-item .mini-preview-item { margin: 0; border-color: var(--border-subtle); }

        /* 右侧上传占位区域 */
        .mini-preview-upload-zone {
            cursor: pointer;
            border: 1.5px dashed var(--border);
            transition: all 0.18s ease;
        }
        .mini-preview-upload-zone:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .upload-placeholder {
            flex-direction: column;
            gap: 4px;
        }
        .upload-placeholder .upload-icon-sm {
            width: 20px;
            height: 20px;
            stroke: var(--fg-muted);
            stroke-width: 1.6;
        }
        .mini-preview-upload-zone:hover .upload-icon-sm { stroke: var(--accent); }
        .upload-placeholder-text {
            font-size: 9px;
            color: var(--fg-muted);
        }
        .mini-preview-upload-zone:hover .upload-placeholder-text { color: var(--accent); }

        /* 右侧截图缩略图 */
        .mini-preview-screenshot img { object-fit: contain; }
        .badge-screenshot { background: rgba(0,200,170,0.08); color: #00c8aa; }


        .preview-pair-label-row {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 4px;
        }
        .preview-pair-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--fg-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
        .preview-pair-badge {
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 1px 7px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* Original mini preview styles (kept for single mode fallback) */
        .mini-preview-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .mini-preview-item {
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .mini-preview-img-wrap {
            aspect-ratio: 3/2;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--bg);
        }
        .mini-preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .mini-preview-label {
            font-size: 9px;
            text-align: center;
            padding: 3px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-design { color: var(--accent); }
        .badge-shot { color: var(--warning); }

        /* Batch capture progress toast */
        .batch-progress-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            text-align: center;
            pointer-events: none;
        }
        .batch-progress-inner {
            background: var(--bg-elevated) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-lg);
            padding: 20px 28px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.5), 0 0 60px var(--accent-glow);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            min-width: 220px;
        }
        .batch-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .batch-progress-text {
            font-size: 13px;
            color: var(--fg);
            font-weight: 500;
        }
        .batch-progress-sub {
            font-size: 11px;
            color: var(--fg-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Compare Button */
        .btn-compare-wrapper {
            padding: 16px;
        }
        .btn-compare {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--success), #00b377);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 214, 143, 0.2);
        }
        .btn-compare:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(0, 214, 143, 0.35);
        }
        .btn-compare:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== CONTENT AREA (RIGHT) ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg);
            position: relative;
        }

        /* Canvas Container - the star of the show */
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 320px;
            position: relative;
            overflow: hidden;
        }
        /* Bug marking mode cursor */
        .canvas-container.mark-mode {
            cursor: crosshair;
        }
        .canvas-container.mark-mode .comparison-canvas {
            cursor: crosshair;
        }
        /* Bug marker overlay - covers entire canvas area, intercepts clicks */
        .bug-marker-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5;
        }
        .bug-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            cursor: pointer;
            z-index: 10;
        }
        .bug-dot-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--danger);
            border: 2.5px solid white;
            box-shadow: 0 2px 8px rgba(255,92,92,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            transition: transform 0.15s ease;
        }
        .bug-dot:hover .bug-dot-inner {
            transform: scale(1.25);
        }
        .canvas-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--fg-muted);
        }
        .canvas-placeholder svg {
            width: 64px;
            height: 64px;
            opacity: 0.25;
        }
        .canvas-placeholder p {
            font-size: 14px;
            max-width: 260px;
            text-align: center;
            line-height: 1.6;
        }
        .comparison-canvas {
            border-radius: var(--radius-md);
            box-shadow:
                0 0 0 1px var(--border),
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 60px var(--accent-glow);
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Results Bar (below canvas) */
        .results-bar {
            padding: 0 20px 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            flex-shrink: 0;
        }
        .results-bar.visible {
            display: flex;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 10px;
        }
        .stat-box {
            flex: 1;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px;
            font-weight: 600;
            color: var(--accent);
        }
        .stat-val.danger { color: var(--danger); }
        .stat-val.warn { color: var(--warning); }
        .stat-lbl {
            font-size: 10px;
            color: var(--fg-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* View Toggle + Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .view-switcher {
            display: inline-flex;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            padding: 3px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .v-btn {
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: var(--fg-muted);
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.18s ease;
            white-space: nowrap;
        }
        .v-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        /* Slider Group */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
        }
        .slider-group label {
            font-size: 10px;
            color: var(--fg-muted);
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
        }
        input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 6px var(--accent-glow);
        }

        /* Opacity quick-toggle button (single toggle) */
        .opacity-toggles {
            display: flex;
            margin-left: 4px;
        }
        .op-toggle {
            padding: 3px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-hover);
            color: var(--fg-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .op-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .slider-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--fg-secondary);
            min-width: 26px;
            text-align: right;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            flex: 1;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--fg-secondary);
            transition: all 0.18s ease;
        }
        .btn-action:hover {
            background: var(--bg-hover);
            color: var(--fg);
        }
        .btn-action.danger-style {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-dim);
        }
        .btn-action.danger-style:hover {
            background: rgba(255, 92, 92, 0.2);
        }
        /* Mark bug button active state */
        .btn-action.mark-active {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-dim);
            box-shadow: 0 0 12px rgba(255,92,92,0.3);
        }

        /* Bug Annotation Panel (popover) */
        .bug-panel {
            position: absolute;
            z-index: 200;
            width: 240px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,92,92,0.2);
            padding: 12px;
            display: none;
        }
        .bug-panel.visible {
            display: block;
            animation: panelIn 0.15s ease;
        }
        @keyframes panelIn { from { opacity:0; transform:translateY(-4px) scale(0.97); } to { opacity:1; transform:none; } }
        .bug-panel-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--danger);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .bug-panel-textarea {
            width: 100%;
            height: 60px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--fg);
            font-size: 12px;
            font-family: inherit;
            padding: 8px;
            resize: none;
            outline: none;
            display: block;
            margin-bottom: 8px;
        }
        .bug-panel-textarea:focus {
            border-color: var(--accent);
        }
        .bug-panel-actions {
            display: flex;
            gap: 6px;
        }
        .btn-bp {
            flex: 1;
            padding: 6px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.15s ease;
        }
        .btn-bp-save {
            background: var(--danger);
            color: white;
        }
        .btn-bp-save:hover { background: #ff4040; }
        .btn-bp-del {
            background: var(--bg-hover);
            color: var(--fg-muted);
            border: 1px solid var(--border);
        }
        .btn-bp-del:hover { color: var(--danger); border-color: var(--danger); }

        /* Bug List in sidebar */
        .bug-list-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
            max-height: 180px;
            overflow-y: auto;
            display: none;
        }
        .bug-list-section.visible { display: block; }
        .bug-list-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--fg-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .bug-count-badge {
            background: var(--danger);
            color: white;
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 600;
        }
        .bug-list-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 7px 8px;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            margin-bottom: 5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.12s ease;
        }
        .bug-list-item:hover {
            border-color: var(--danger-dim);
            background: var(--bg-hover);
        }
        .bug-list-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .bug-list-text {
            font-size: 11px;
            color: var(--fg-secondary);
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Status Toast - floating over canvas area */
        #statusMsg {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
            width: auto;
            max-width: 400px;
        }
        .status-msg {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--bg-elevated) !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
            animation: toastIn 0.2s ease, toastOut 0.3s ease 3.5s forwards;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        @keyframes toastIn { from { opacity:0; transform:translateY(-6px) scale(0.96); } to { opacity:1; transform:none; } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-4px); } }
        .status-msg.info {
            color: #b8b0ff !important;
            border-color: rgba(108, 92, 231, 0.35) !important;
        }
        .status-msg.success {
            color: var(--success) !important;
            border-color: rgba(0, 214, 143, 0.35) !important;
        }
        .status-msg.error {
            color: var(--danger) !important;
            border-color: rgba(255, 92, 92, 0.35) !important;
        }

        /* Footer */
        .footer {
            padding: 10px 20px;
            text-align: center;
            font-size: 10px;
            color: var(--fg-muted);
            border-top: 1px solid var(--border-subtle);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Hidden utility */
        [hidden], .hidden { display: none !important; }
    </style>

<script>
// ============================================
// UI-REL Report Template Generator
// ============================================

/**
 * UI-REL Report Template Generator
 * 从 ui.html 拆分的报告生成模块
 */

function generateReportHtml(data) {
    var designImgUrl = data.designImgUrl;
    var screenshotImgUrl = data.screenshotImgUrl;
    var bugs = data.bugs;
    var diffData = data.diffData;
    var opacity = data.opacity;
    var frameName = data.frameName;

    // Build DOM marker elements for each bug
    var imgW = diffData.width;
    var imgH = diffData.height;
    var bugDomMarkers = '';
    bugs.forEach(function(bug) {
        var pctX = Math.round(bug.x / imgW * 10000) / 100;
        var pctY = Math.round(bug.y / imgH * 10000) / 100;
        var labelText = escapeHtml('#' + bug.id + (bug.text ? ' ' + bug.text : ''));
        bugDomMarkers +=
            '<div class="r-bug-marker" style="left:' + pctX + '%;top:' + pctY + '%;" data-id="' + bug.id + '">' +
            '<div class="r-bug-dot">' +
            '<div class="r-bug-num">' + bug.id + '</div>' +
            '</div>' +
            (bug.text ? '<div class="r-bug-label">' + labelText + '</div>' : '') +
            '</div>';
    });

    // Bug list HTML with checkboxes
    var bugRows = '';
    if (bugs.length > 0) {
        bugs.forEach(function(bug) {
            bugRows +=
                '<tr data-bug-id="' + bug.id + '">' +
                '<td style="width:36px;"><input type="checkbox" class="r-bug-cb" checked data-bug-id="' + bug.id + '" /></td>' +
                '<td style="color:#ff5c5c;font-weight:700;width:50px;" class="r-bug-id-td">#' + bug.id + '</td>' +
                '<td style="font-family:monospace;font-size:12px;color:#8888a0;width:90px;">(' + bug.x + ', ' + bug.y + ')</td>' +
                '<td>' + escapeHtml(bug.text || '-') + '</td>' +
                '</tr>';
        });
    }

    // Date string
    var now = new Date();
    var dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    // --- CSS ---
    var css =
'*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;line-height:1.6;padding:40px 20px;transition:background .25s,color .25s,border-color .25s;}'
+ 'body.dark{background:#16162a;color:#d0d0dc;}'
+ 'body.dark .header{border-color:#6c5ce7;}'
+ 'body.dark .header h1{color:#e0e0e8;}'
+ 'body.dark .meta{color:#777;}'
+ 'body.dark .stat-card{background:#22223a;border-color:#333355;}'
+ 'body.dark .stat-lbl{color:#888;}'
+ 'body.dark .section-title{color:#d0d0dc;}'
+ 'body.dark .main-img-wrap img{border-color:#333355;}'
+ 'body.dark .img-controls{background:rgba(30,30,55,.7);}'
+ 'body.dark .img-controls label{color:#999;}'
+ 'body.dark .op-toggle{background:#2a2a45;border-color:#444;color:#aaa;}'
+ 'body.dark .bug-table{background:#22223a;border-color:#333355;}'
+ 'body.dark .bug-table th{background:#1a1a30;color:#999;border-color:#333355;}'
+ 'body.dark .bug-table td{border-color:#2a2a48;color:#ccc;}'
+ 'body.dark .bug-table tr:hover td{background:rgba(108,92,231,.08);}'
+ 'body.dark .footer{border-color:#333355;color:#666;}'
+'.report{max-width:960px;margin:0 auto;}'
+'.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:14px;border-bottom:2px solid #6c5ce7;transition:border-color .25s;}'
+'.header h1{font-size:22px;color:#333;display:flex;align-items:center;gap:10px;transition:color .25s;}'
+'.header h1 span{background:linear-gradient(135deg,#6c5ce7,#a66cff);color:white;width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;}'
+'.meta{font-size:13px;color:#999;text-align:right;transition:color .25s;}'
// Toolbar
+'.toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;}'
+'.tool-btn{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #ccc;background:#fff;transition:all .2s;color:#666;}'
+'.tool-btn:hover{border-color:#6c5ce7;color:#6c5ce7;background:#fafaff;}'
// Stats
+'.stats{display:flex;gap:12px;margin-bottom:24px;}'
+'.stat-card{flex:1;background:#fff;border-radius:10px;padding:14px;text-align:center;border:1px solid #e4e6eb;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .25s;}'
+'.stat-val{font-size:22px;font-weight:700;color:#6c5ce7;}'
+'.stat-val.danger{color:#ff5c5c;}'
+'.stat-lbl{font-size:10px;color:#999;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}'
// Section titles
+'.section-title{font-size:14px;font-weight:700;margin:20px 0 12px;color:#222;display:flex;align-items:center;gap:8px;transition:color .25s;}'
+'.section-title::before{content:"";width:4px;height:16px;background:#6c5ce7;border-radius:2px;}'
// Image area with opacity control
+'.main-img-wrap{position:relative;text-align:center;margin-bottom:24px;}'
+'.main-img-wrap img{max-width:100%;border-radius:12px;border:1px solid #e4e6eb;box-shadow:0 4px 24px rgba(0,0,0,.08);display:block;transition:opacity .15s ease,border-color .25s;}'
+'.img-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;padding:8px 16px;background:rgba(255,255,255,.65);border-radius:10px;backdrop-filter:blur(8px);}'
+'.img-controls label{font-size:12px;color:#666;font-weight:500;white-space:nowrap;}'
+'.img-controls input[type=range]{width:130px;height:4px;-webkit-appearance:none;appearance:none;background:#ddd;border-radius:2px;outline:none;}'
+'.img-controls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#6c5ce7;cursor:pointer;box-shadow:0 0 6px rgba(108,92,231,.4);}'
+'.op-toggle{padding:4px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:#666;}'
+'.op-toggle:hover{border-color:#6c5ce7;color:#6c5ce7;}'
// Bug markers (DOM overlay on image)
+'.r-bug-marker{position:absolute;z-index:10;transform:translate(-50%,-50%);cursor:pointer;transition:opacity .25s ease;}'
+'.r-bug-marker.dimmed{opacity:.2;}'
+'.r-bug-dot{width:38px;height:38px;border-radius:50%;background:#ff5c5c;border:3.5px solid white;box-shadow:0 2px 12px rgba(255,92,92,.45),0 0 24px rgba(255,92,92,.18);display:flex;align-items:center;justify-content:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .25s ease;}'
+'.r-bug-dot.checked-green{background:#00d68f;box-shadow:0 2px 12px rgba(0,214,143,.45),0 0 24px rgba(0,214,143,.18);}'
+'.r-bug-num{font-size:16px;font-weight:800;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}'
+'.r-bug-label{position:absolute;top:22px;left:20px;background:rgba(255,92,92,.95);color:white;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 2px 8px rgba(255,92,92,.35);pointer-events:none;opacity:0;transform:translateY(-4px);transition:opacity .2s ease,transform .2s ease;}'
+'.r-bug-marker:hover .r-bug-dot{transform:scale(1.35);}'
+'.r-bug-marker:hover .r-bug-label{opacity:1;transform:none;}'
// Bug table with checkboxes
+'.bug-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e4e6eb;box-shadow:0 1px 8px rgba(0,0,0,.05);transition:all .25s;}'
+'.bug-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#888;background:#fafbfc;padding:10px 14px;border-bottom:2px solid #eee;}'
+'.bug-table td{padding:10px 14px;border-bottom:1px solid #f7f8fa;font-size:12px;vertical-align:top;transition:background .2s,color .2s;}'
+'.bug-table tr:last-child td{border-bottom:none;}'
+'.bug-table tr:hover td{background:#fef5f5;}'
+'.r-bug-cb{width:17px;height:17px;accent-color:#00d68f;cursor:pointer;}'
+'.r-bug-id-td{transition:color .25s ease;}'
// Footer
+'.footer{text-align:center;margin-top:32px;padding:18px;color:#bbb;font-size:11px;border-top:1px solid #eee;transition:border-color .25s;}';

    // --- Inline JS for interactivity (joined by semicolons to avoid parse errors) ---
    var inlineJs = [
'toggleTheme=function(){var b=document.body;b.classList.toggle("dark");localStorage.setItem("uirel-theme",b.classList.contains("dark")?"dark":"light");}',
'(function(){try{if(localStorage.getItem("uirel-theme")==="dark")document.body.classList.add("dark")}catch(e){}})();',
'setImgOpacity=function(v){var el=document.getElementById("reportScreenshotImg");if(el)el.style.opacity=v/100;var lb=document.getElementById("opValLabel");if(lb)lb.textContent=v+"%"}',
'document.addEventListener("DOMContentLoaded",function(){',
'document.querySelectorAll(".r-bug-cb").forEach(function(cb){',
'cb.addEventListener("change",function(){',
'var id=this.dataset.bugId,chk=this.checked;',
"var dot=document.querySelector('.r-bug-marker[data-id='+id+'] .r-bug-dot');",
'if(dot){dot.classList.toggle("checked-green",chk);dot.classList.remove("unchecked-red");if(!chk)dot.classList.add("unchecked-red");}',
"var mk=document.querySelector('.r-bug-marker[data-id='+id+']');",
'if(mk)mk.classList.toggle("dimmed",!chk);',
'var td=cb.closest("tr").querySelector(".r-bug-id-td");',
'if(td)td.style.color=chk?"#00d68f":"#ff5c5c";',
'try{saveChecks()}catch(e){}',
'});});)',
'saveChecks=function(){var s={};document.querySelectorAll(".r-bug-cb").forEach(function(c){s[c.dataset.bugId]=c.checked});localStorage.setItem("uirel-bug-checks",JSON.stringify(s))}',
'loadChecks=function(){try{var d=JSON.parse(localStorage.getItem("uirel-bug-checks"));if(d)document.querySelectorAll(".r-bug-cb").forEach(function(c){if(d[c.dataset.bugId]===false){c.checked=false;c.dispatchEvent(new Event("change"))}})}catch(e){}}',
'loadChecks();',
'});'
].join(';');
    // --- Assemble full HTML ---
    var html =
'<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>UI-REL Report</title>'
+'<style>'
+ css
+'</style></head><body>'
+'<div class="report">'
// Header + toolbar
+'<div class="header"><h1><span>U</span> \u53e0\u52a0\u6548\u679c</h1><div class="meta">' + escapeHtml(frameName || 'Unknown') + '<br/>' + dateStr + '</div></div>'
+'<div class="toolbar"><button class="tool-btn" id="themeToggleBtn" onclick="toggleTheme()">\u26a1 \u5207\u6362\u4eae/\u6697</button></div>'

// Stats row
+ (diffData ?
'<div class="stats">'
+'<div class="stat-card"><div class="stat-val">'+document.getElementById('diffPercent').textContent+'</div><div class="stat-lbl">\u5dee\u5f02\u7387</div></div>'
+'<div class="stat-card"><div class="stat-val">'+document.getElementById('diffPixels').textContent+'</div><div class="stat-lbl">\u5dee\u5f02\u50cf\u7d20</div></div>'
+'<div class="stat-card"><div class="stat-val">'+document.getElementById('similarityScore').textContent+'</div><div class="stat-lbl">\u76f8\u4f3c\u5ea6</div></div>'
+'<div class="stat-card"><div class="stat-val danger" style="color:#ff5c5c;">'+bugs.length+'</div><div class="stat-lbl">Bug \u6570\u91cf</div></div>'
+'</div>'
: '')

// Image section with dual-layer overlay and bug markers
+'<div class="section-title">\u53e0\u52a0\u6548\u679c (\u5e26 Bug \u6807\u8bb0)</div>'
+'<div class="main-img-wrap">'
+'<div class="img-stack" style="position:relative;display:inline-block;max-width:100%;">'
+'<img id="reportDesignImg" src="'+designImgUrl+'" alt="design" style="max-width:100%;display:block;position:relative;z-index:1;" />'
+'<img id="reportScreenshotImg" src="'+screenshotImgUrl+'" alt="screenshot" style="max-width:100%;display:block;position:absolute;top:0;left:0;z-index:2;opacity:'+(opacity/100)+';" />'
+'</div>'
+ bugDomMarkers
// Opacity control bar below image
+'<div class="img-controls">'
+'<label>\u900f\u660e\u5ea6</label>'
+'<input type="range" min="0" max="100" value="'+opacity+'" oninput="setImgOpacity(this.value)" />'
+'<span id="opValLabel" style="font-size:12px;color:#666;min-width:32px;">'+opacity+'%</span>'
+'<button class="op-toggle" onclick="setImgOpacity(0)">0</button>'
+'<button class="op-toggle" onclick="setImgOpacity(100)">1</button>'
+'</div>'
+'</div>'

// Bug table with checkboxes
+ (bugs.length > 0 ?
('<div class="section-title">Bug \u6807\u8bb0\u5217\u8868 ('+bugs.length+')</div>'
+'<table class="bug-table"><thead><tr><th></th><th>#ID</th><th>\u5750\u6807\u4f4d\u7f6e</th><th>\u63cf\u8ff0</th></tr></thead><tbody>'+bugRows+'</tbody></table>')
: '')

// Footer
+'<div class="footer">UI-REL Plugin v1.0 &middot; '+dateStr+'</div>'
+'</div>'

// Inline script - split tag to avoid closing current script context
+'<script>'
+ inlineJs
+'<' + '/script><' + '/body><' + '/html>';

    return html;
}
</script>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-brand">
        <div class="header-logo">U</div>
        <div>
            <h1>UI<span>-</span>REL <span class="header-subtitle">Design Review</span></h1>
        </div>
    </div>
</div>

<div class="main-layout">

    <!-- === LEFT SIDEBAR === -->
    <div class="sidebar">

        <!-- Frame Section -->
        <div class="sidebar-section">
            <div class="sidebar-label">设计稿来源</div>
            <div class="frame-card" id="frameSelector">
                <div class="no-frame">未选择 Frame</div>
            </div>
            <button class="btn-select-frame" id="selectFrameBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
                选择 Figma Frame
            </button>
        </div>

        <!-- Screenshot Upload (全局上传区，仅单模式时使用；多模式时隐藏) -->
        <div class="sidebar-section" id="globalScreenshotSection">
            <div class="sidebar-label">实机截图</div>
            <div class="upload-zone" id="uploadArea">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17,8 12,3 7,8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <div class="upload-title">点击或拖拽上传截图</div>
                <div class="upload-hint">PNG / JPG / WEBP</div>
            </div>
            <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
        </div>

        <!-- Mini Previews (single mode fallback) -->
        <div class="sidebar-section" id="previewSection" style="display:none;">
            <div class="sidebar-label">预览缩略图</div>
            <!-- Single mode: one pair of previews -->
            <div class="mini-preview-row" id="singlePreviewRow">
                <div class="mini-preview-item">
                    <div class="mini-preview-img-wrap"><img class="mini-preview-img" id="designPreview"></div>
                    <div class="mini-preview-label badge-design">设计稿 <span id="designSize">-</span></div>
                </div>
                <div class="mini-preview-item">
                    <div class="mini-preview-img-wrap"><img class="mini-preview-img" id="screenshotPreview"></div>
                    <div class="mini-preview-label badge-shot">截图 <span id="screenshotSize">-</span></div>
                </div>
            </div>
            <!-- Multi mode: list of preview pairs -->
            <div class="preview-pair-list" id="multiPreviewList"></div>
        </div>

        <!-- Bug List -->
        <div class="bug-list-section" id="bugListSection">
            <div class="bug-list-title">
                <span>Bug 标记</span>
                <span class="bug-count-badge" id="bugCountBadge">0</span>
            </div>
            <div id="bugListContainer"></div>
        </div>

        <!-- Compare Button -->
        <div style="flex:1;"></div>
        <div class="btn-compare-wrapper">
            <button class="btn-compare" id="compareBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                    <path d="M11 8v6M8 11h6"/>
                </svg>
                开始差异分析
            </button>
        </div>
    </div>

    <!-- === RIGHT CONTENT AREA === -->
    <div class="content-area">

        <!-- Canvas Area -->
        <div class="canvas-container" id="canvasContainer">
            <!-- Floating toast for status messages -->
            <div id="statusMsg"></div>

            <div class="canvas-placeholder" id="canvasPlaceholder">
                <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2">
                    <rect x="8" y="8" width="48" height="48" rx="8" stroke-dasharray="4 4"/>
                    <circle cx="32" cy="28" r="8"/>
                    <path d="M20 44l8-8 6 6 10-10"/>
                    <circle cx="46" cy="22" r="3"/>
                </svg>
                <p>选择设计稿并上传截图后<br>差异对比将在此显示</p>
            </div>
            <canvas id="comparisonCanvas" class="comparison-canvas" style="display:none;"></canvas>
            <!-- Bug marker overlay (dots positioned over canvas) -->
            <div class="bug-marker-overlay" id="bugMarkerOverlay"></div>

            <!-- Bug annotation panel (popover) -->
            <div class="bug-panel" id="bugPanel">
                <div class="bug-panel-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Bug #<span id="bugPanelNum">1</span> &middot; 标注
                </div>
                <textarea class="bug-panel-textarea" id="bugPanelText" placeholder="描述这个 Bug..."></textarea>
                <div class="bug-panel-actions">
                    <button class="btn-bp btn-bp-save" id="bugPanelSave">保存</button>
                    <button class="btn-bp btn-bp-del" id="bugPanelDel">删除</button>
                    <button class="btn-bp btn-bp-del" id="bugPanelCancel">取消</button>
                </div>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="results-bar" id="resultSection">

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-val" id="diffPercent">0%</div>
                    <div class="stat-lbl">差异率</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="diffPixels">0</div>
                    <div class="stat-lbl">像素数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="similarityScore">-</div>
                    <div class="stat-lbl">相似度</div>
                </div>
            </div>

            <!-- View Switcher + Sliders -->
            <div class="controls-row">
                <div class="view-switcher">
                    <button class="v-btn active" data-mode="overlay">叠加</button>
                    <button class="v-btn" data-mode="heatmap">热力图</button>
                    <button class="v-btn" data-mode="sidebyside">并排</button>
                    <button class="v-btn" data-mode="diffonly">仅差异</button>
                </div>
                <div class="slider-group" id="sensitivityGroup" style="display:none;">
                    <label>灵敏度</label>
                    <input type="range" id="sensitivitySlider" min="5" max="80" value="30">
                    <span class="slider-val" id="sensitivityValue">30</span>
                </div>
                <div class="slider-group" id="opacityGroup">
                    <label>透明度</label>
                    <input type="range" id="opacitySlider" min="0" max="100" value="50">
                    <span class="slider-val" id="opacityValue">50%</span>
                    <button class="op-toggle" id="opToggleSwap" title="切换 0% / 100%">0/1</button>
                </div>
            </div>

            <!-- Actions -->
            <div class="action-row">
                <button class="btn-action" id="exportBtn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导出报告
                </button>
                <button class="btn-action danger-style" id="resetBtn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    删除
                </button>
            </div>
        </div>

    </div><!-- /content-area -->
</div><!-- /main-layout -->

<div class="footer">UI-REL Plugin v1.0 &middot; Design Review</div>


<script>
// ============================================
// UI-REL Design Review Plugin - UI Logic
// ============================================

let state = {
    designImage: null,
    screenshotImage: null,
    designWidth: 0,
    designHeight: 0,
    screenshotWidth: 0,
    screenshotHeight: 0,
    diffData: null,
    sensitivity: 30,
    opacity: 50,
    viewMode: 'overlay',
    selectedFrameName: '',
    // Bug marking system
    bugs: [],              // [{id, x, y, text, canvasX, canvasY}]
    nextBugId: 1,
    isMarkMode: false,
    editingBugId: null,   // currently editing in panel (real id or '__pending__')
    _pendingBug: null,    // unsaved bug waiting for description
    // Canvas display scale for coordinate conversion
    _canvasScaleX: 1,
    _canvasScaleY: 1,
    _canvasOffsetX: 0,
    _canvasOffsetY: 0,
    // Multi-pair support: each entry = one (design + screenshot) comparison pair
    comparePairs: [],      // [{designDataUrl, frameName, dw, dh, designImg, screenshotDataUrl, sw, sh, screenshotImg, diffData, bugs}]
    activePairIndex: -1   // current active pair index
};

window.addEventListener('message', (event) => {
    let raw = event.data;
    let msg = raw && raw.pluginMessage ? raw.pluginMessage : {};
    if (msg.pluginMessage && !msg.type) msg = msg.pluginMessage;

    const type = msg ? msg.type : undefined;
    const data = msg ? msg.data : undefined;

    console.log('[UI] received message:', type, data ? 'hasData' : 'noData');
    if (!type) return;

    switch (type) {
        case 'design-captured':
            handleDesignCaptured(data);
            break;
        case 'design-captured-batch':
            handleDesignCapturedBatch(data);
            break;
        case 'batch-capture-start':
            showBatchProgress(data.count);
            break;
        case 'batch-capture-progress':
            updateBatchProgress(data.current, data.total, data.frameName);
            break;
        case 'batch-capture-complete':
            hideBatchProgress();
            
            // Restore select button state
            var sbtn = document.getElementById('selectFrameBtn');
            if (sbtn && !sbtn.classList.contains('captured')) {
                sbtn.disabled = false;
                sbtn.className = 'btn-select-frame captured';
                sbtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> 已捕获 ' + data.count + ' 个设计稿';
                sbtn.disabled = true;
            }
            
            showStatus('成功捕获 ' + data.count + ' 个设计稿！点击左侧缩略图可切换查看', 'success');
            
            // After batch capture, auto-select first pair
            if (state.comparePairs.length > 0) switchToPair(0);
            break;
        case 'batch-capture-error':
            showStatus('捕获 "' + data.frameName + '" 失败: ' + data.error, 'error');
            break;
        case 'multi-selection-detected':
            showMultiCaptureOption(data.data);
            // 回传已捕获的 frameName 列表，让插件只发送新增的
            var capturedNames = state.comparePairs.map(function(p) { return p.frameName; });
            parent.postMessage({ pluginMessage: { type: 'captured-frame-names', names: capturedNames } }, '*');
            break;
        case 'error':
            showStatus(data.message, 'error');
            break;
        case 'log':
            console.log('[Plugin]', data.message);
            break;
    }
});

document.addEventListener('DOMContentLoaded', () => {
    setupDragDrop();

    document.getElementById('selectFrameBtn').addEventListener('click', selectFrame);
    document.getElementById('uploadArea').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', handleFileUpload);
    document.getElementById('compareBtn').addEventListener('click', startComparison);
    document.getElementById('exportBtn').addEventListener('click', exportResult);
    document.getElementById('resetBtn').addEventListener('click', deleteCurrentPair);

    document.querySelectorAll('.v-btn').forEach(btn => {
        btn.addEventListener('click', () => setViewMode(btn.dataset.mode));
    });

    document.getElementById('sensitivitySlider').addEventListener('input', (e) => updateSensitivity(e.target.value));
    document.getElementById('opacitySlider').addEventListener('input', (e) => updateOpacity(e.target.value));

    document.getElementById('opToggleSwap').addEventListener('click', toggleOpacity);

    // Bug marking system: direct click-to-mark after analysis
    // Mark mode is auto-enabled when results are shown
    document.getElementById('bugPanelSave').addEventListener('click', saveBugAnnotation);
    document.getElementById('bugPanelDel').addEventListener('click', deleteBugFromPanel);
    document.getElementById('bugPanelCancel').addEventListener('click', hideBugPanel);

    // Click on container (covers both canvas and overlay) for bug marking
    var containerEl = document.getElementById('canvasContainer');
    containerEl.addEventListener('click', onContainerClick);

    // Enter loading state before requesting selection (capture may start immediately)
    enterCaptureLoading();
    parent.postMessage({ pluginMessage: { type: 'request-current-selection' } }, '*');
});

function enterCaptureLoading() {
    var btn = document.getElementById('selectFrameBtn');
    if (!btn || btn.classList.contains('captured')) return; // don't override already-captured
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 捕获中...';
}

function selectFrame() {
    showStatus('正在捕获设计稿，请稍候...', 'info');
    enterCaptureLoading();
    parent.postMessage({ pluginMessage: { type: 'select-frame' } }, '*');
}

function exitCaptureLoading() {
    var btn = document.getElementById('selectFrameBtn');
    if (!btn) return;
    // Only restore if still in loading state (not already captured)
    if (btn.classList.contains('captured')) return;
    btn.disabled = false;
    btn.className = 'btn-select-frame';
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg> 选择 Figma Frame';
}

function handleDesignCaptured(data) {
    if (!data || !data.imageDataUrl) {
        showStatus('未能获取设计稿图片，请确认已选中有效的 Frame', 'error');
        exitCaptureLoading();
        return;
    }

    const img = new Image();
    img.onload = () => {
        state.designImage = img;
        state.designWidth = img.width;
        state.designHeight = img.height;
        state.selectedFrameName = data.frameName || 'Selected Frame';

        // Create or update pair in comparePairs
        if (state.comparePairs.length === 0) {
            // Single mode: create first pair with just design
            state.comparePairs.push({
                designDataUrl: data.imageDataUrl,
                frameName: data.frameName || 'Selected Frame',
                dw: img.width,
                dh: img.height,
                designImg: img,
                screenshotDataUrl: null,
                sw: 0,
                sh: 0,
                screenshotImg: null,
                diffData: null,
                bugs: []
            });
            state.activePairIndex = 0;
        } else if (state.activePairIndex >= 0) {
            // Update current active pair's design
            var p = state.comparePairs[state.activePairIndex];
            p.designDataUrl = data.imageDataUrl;
            p.frameName = data.frameName || 'Selected Frame';
            p.dw = img.width; p.dh = img.height;
            p.designImg = img;
        }

        updateFrameCardUI(state.selectedFrameName, img.width, img.height);

        const btn = document.getElementById('selectFrameBtn');
        btn.className = 'btn-select-frame captured';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> 已捕获设计稿';
        btn.disabled = true;

        // 统一使用列表项渲染（单模式也用多模式样式）
        document.getElementById('singlePreviewRow').style.display = 'none';
        document.getElementById('globalScreenshotSection').style.display = 'none';
        document.getElementById('previewSection').style.display = 'block';
        refreshMultiPreviewList();

        showStatus('\u6210\u529f\u6355\u83b7\u8bbe\u8ba1\u7a3f: ' + state.selectedFrameName + ' (' + img.width + '\u00d7' + img.height + ')', 'success');
        checkReadyToCompare();
    };
    img.onerror = function(e) { console.error('[UI] Image load error:', e); };
    img.src = data.imageDataUrl;
}

// 公共方法：更新 Frame 卡片 UI
function updateFrameCardUI(frameName, w, h) {
    document.getElementById('frameSelector').className = 'frame-card active';
    document.getElementById('frameSelector').innerHTML =
        '<div class="frame-info-row">' +
        '<div class="frame-icon-sm">F</div>' +
        '<div><div class="frame-name-text">' + escapeHtml(frameName) + '</div>' +
        '<div class="frame-dims">' + w + ' x ' + h + ' px</div></div>' +
        '</div>';
}

// ============================================
// 多设计稿 / 多组对比 支持
// ============================================

// 处理批量捕获的单个设计稿
function handleDesignCapturedBatch(data) {
    if (!data || !data.imageDataUrl) return;

    // 去重：检查同名 frame 是否已存在
    var frameName = data.frameName || ('Frame ' + data.index);
    var exists = state.comparePairs.some(function(p) { return p.frameName === frameName; });
    if (exists) return; // 已存在则跳过

    const img = new Image();
    img.onload = () => {
        state.comparePairs.push({
            designDataUrl: data.imageDataUrl,
            frameName: frameName,
            dw: data.width, dh: data.height,
            designImg: img,
            screenshotDataUrl: null,
            sw: 0, sh: 0,
            screenshotImg: null,
            diffData: null,
            bugs: []
        });
        refreshMultiPreviewList();
        showStatus('捕获设计稿: ' + frameName, 'success');
    };
    img.src = data.imageDataUrl;
}

// 检测到多选时进入 loading 并自动开始批量捕获
function showMultiCaptureOption(data) {
    var count = (data && data.count) || 0;

    // Hide single preview, prepare for multi
    document.getElementById('singlePreviewRow').style.display = 'none';

    showStatus('正在捕获 ' + count + ' 个设计稿...', 'info');
}

function showBatchProgress(total) {
    total = total || 0;
    var container = document.getElementById('canvasContainer');
    var existing = document.getElementById('batchProgressToast');
    if (existing) existing.remove();
    
    var toast = document.createElement('div');
    toast.id = 'batchProgressToast';
    toast.className = 'batch-progress-toast';
    toast.innerHTML =
        '<div class="batch-progress-inner">' +
        '<div class="batch-spinner"></div>' +
        '<div class="batch-progress-text">正在捕获设计稿...</div>' +
        '<div class="batch-progress-sub" id="batchProgressSub">准备中...</div>' +
        '</div>';
    container.appendChild(toast);
}

function updateBatchProgress(current, total, name) {
    var el = document.getElementById('batchProgressSub');
    if (el) el.textContent = current + ' / ' + total + ' - ' + (name || '');
}

function hideBatchProgress() {
    var el = document.getElementById('batchProgressToast');
    if (el) el.remove();
}

// 刷新左侧多组预览列表
function refreshMultiPreviewList() {
    var listEl = document.getElementById('multiPreviewList');
    var previewSection = document.getElementById('previewSection');
    
    // Always show preview section when we have data
    previewSection.style.display = '';
    listEl.innerHTML = '';

    if (state.comparePairs.length <= 1) {
        // Single mode - 也使用多模式的列表项样式（右侧内嵌上传/缩略图）
        document.getElementById('singlePreviewRow').style.display = 'none';
        var globalSS = document.getElementById('globalScreenshotSection');
        if (globalSS) globalSS.style.display = 'none';
        var label = document.querySelector('#previewSection .sidebar-label');
        if (label) label.textContent = '预览缩略图';
        // 不 return，继续往下走统一个列表项渲染
    }

    // Multi mode - ensure section is visible!
    previewSection.style.display = '';
    document.getElementById('singlePreviewRow').style.display = 'none';

    // 多模式时隐藏全局截图上传区域（截图上传已移至每项右侧）
    var globalSS = document.getElementById('globalScreenshotSection');
    if (globalSS) globalSS.style.display = 'none';
    
    var label = document.querySelector('#previewSection .sidebar-label');
    if (label && !label.textContent.match(/\(/)) {
        label.innerHTML = '预览缩略图 <span style="color:var(--accent);font-weight:600;">(' + state.comparePairs.length + ')</span>';
    } else if (label) {
        label.innerHTML = '预览缩略图 <span style="color:var(--accent);font-weight:600;">(' + state.comparePairs.length + ')</span>';
    }

    state.comparePairs.forEach(function(pair, idx) {
        var item = document.createElement('div');
        item.className = 'preview-pair-item' + (idx === state.activePairIndex ? ' active' : '');
        item.setAttribute('data-pair-index', idx);

        // Determine status text
        var statusText = '';
        var statusClass = '';
        if (pair.diffData) {
            statusText = '已分析';
            statusClass = 'style="color:var(--success);"';
        } else if (pair.screenshotImg) {
            statusText = '待分析';
            statusClass = 'style="color:var(--warning);"';
        } else {
            statusText = '缺截图';
            statusClass = 'style="color:var(--fg-muted);cursor:pointer;"';
            isDeleteBadge = true;
        }

        item.innerHTML =
            '<div class="preview-pair-label-row">' +
            '<span class="preview-pair-name" title="' + escapeHtml(pair.frameName) + '">' + escapeHtml(pair.frameName) + '</span>' +
            (isDeleteBadge
                ? '<span class="preview-pair-badge delete-badge" data-delete-idx="' + idx + '" title="点击删除此项" style="color:var(--danger);background:rgba(220,38,38,0.08);cursor:pointer;">' +
                  '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>'
                : '<span class="preview-pair-badge" ' + statusClass + '>' + statusText + '</span>'
            ) +
            '</div>' +
            '<div class="mini-preview-item">' +
            '<div class="mini-preview-img-wrap"><img class="mini-preview-img" src="' + (pair.designDataUrl || '') + '" alt=""></div>' +
            '<div class="mini-preview-label badge-design">' + pair.dw + '\u00d7' + pair.dh + '</div>' +
            '</div>' +
            // 右侧：截图上传/缩略图区域（使用与左侧相同的 mini-preview 结构）
            (pair.screenshotImg ?
                '<div class="mini-preview-item mini-preview-screenshot">' +
                '<div class="mini-preview-img-wrap"><img class="mini-preview-img" src="' + pair.screenshotDataUrl + '" alt="截图"></div>' +
                '<div class="mini-preview-label badge-screenshot">' + pair.sw + '\u00d7' + pair.sh + '</div>' +
                '</div>'
            :
                '<div class="mini-preview-item mini-preview-upload-zone" data-pair-idx="' + idx + '" title="点击或拖拽上传截图">' +
                '<div class="mini-preview-img-wrap upload-placeholder">' +
                '<svg class="upload-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>' +
                '<span class="upload-placeholder-text">上传截图</span>' +
                '</div>' +
                '<div class="mini-preview-label badge-screenshot">-</div>' +
                '<input type="file" class="pair-file-input" data-pair-idx="' + idx + '" accept="image/png,image/jpeg,image/webp" style="display:none;">' +
                '</div>'
            );

        item.addEventListener('click', function(e) {
            // 如果点击的是截图上传/缩略图区域，不触发切换
            var target = e.target;
            while (target && target !== item) {
                if (target.classList.contains('mini-preview-upload-zone') ||
                    target.classList.contains('mini-preview-screenshot') ||
                    target.classList.contains('upload-placeholder')) {
                    return; // 由下面单独的事件处理
                }
                target = target.parentElement;
            }
            switchToPair(idx);
        });

        // 绑定每项的截图上传事件
        var uploadEl = item.querySelector('.mini-preview-upload-zone');
        var fileInputEl = item.querySelector('.pair-file-input');

        if (uploadEl) {
            // 点击上传区域触发文件选择
            uploadEl.addEventListener('click', function(e) { e.stopPropagation(); fileInputEl.click(); });
            // 拖拽支持
            ['dragenter', 'dragover'].forEach(function(name) {
                uploadEl.addEventListener(name, function(e) { e.preventDefault(); e.stopPropagation(); uploadEl.classList.add('drag-over'); });
            });
            ['dragleave', 'drop'].forEach(function(name) {
                uploadEl.addEventListener(name, function(e) { e.preventDefault(); e.stopPropagation(); uploadEl.classList.remove('drag-over'); });
            });
            uploadEl.addEventListener('drop', function(e) {
                e.stopPropagation();
                if (e.dataTransfer.files.length > 0) processFileForPair(e.dataTransfer.files[0], idx);
            });
            // 文件选择变化
            if (fileInputEl) fileInputEl.addEventListener('change', function(e) {
                e.stopPropagation();
                if (e.target.files[0]) processFileForPair(e.target.files[0], idx);
                this.value = ''; // reset so same file can be re-selected
            });
        }

        // ===== 叉号删除按钮 =====
        var deleteBadge = item.querySelector('.delete-badge');
        if (deleteBadge) {
            deleteBadge.addEventListener('click', function(e) {
                e.stopPropagation();
                var delIdx = parseInt(this.getAttribute('data-delete-idx'));
                performDeletePair(item, delIdx);
            });
        }

        // ===== 滑动删除（左滑）=====
        var startX = 0, currentX = 0, isDragging = false, swiped = false;
        var THRESHOLD = 80; // 触发删除的滑动距离

        item.addEventListener('touchstart', function(e) {
            startX = e.touches[0].clientX;
            isDragging = true; swiped = false;
            item.classList.add('swiping');
        }, { passive: true });

        item.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            currentX = e.touches[0].clientX;
            var dx = currentX - startX;

            if (dx < -10) {
                // 向左滑动
                e.preventDefault(); // 阻止列表滚动
                var translateX = Math.max(dx, -item.offsetWidth * 0.8);
                item.style.transform = 'translateX(' + translateX + 'px)';
                item.style.opacity = Math.max(1 + dx / (item.offsetWidth * 1.5), 0.2);
                if (Math.abs(dx) > THRESHOLD && !swiped) {
                    swiped = true;
                    // 背景变红提示
                    item.style.background = 'rgba(220,38,38,0.08)';
                    item.style.borderColor = 'rgba(220,38,38,0.3)';
                } else if (!swiped) {
                    item.style.background = '';
                    item.style.borderColor = '';
                }
            }
        }, { passive: false });

        item.addEventListener('touchend', function(e) {
            if (!isDragging) return;
            isDragging = false;
            item.classList.remove('swiping');
            var dx = currentX - startX || 0;

            if (swiped && Math.abs(dx) > THRESHOLD) {
                // 达到阈值 → 执行删除（performDeletePair 内部处理两阶段动画）
                performDeletePair(item, idx);
            } else {
                // 没达到阈值 → 弹回原位
                item.style.transform = '';
                item.style.opacity = '';
                item.style.background = '';
                item.style.borderColor = '';
            }
            startX = 0; currentX = 0;
        }, { passive: true });

        // 鼠标拖拽也支持（PC 端）
        var mouseStartX = 0, mouseCurrentX = 0, mouseDragging = false, mouseSwiped = false;
        item.addEventListener('mousedown', function(e) {
            // 忽略按钮和上传区域的点击
            if (e.target.closest('.mini-preview-upload-zone') || e.target.closest('.mini-preview-screenshot')) return;
            mouseStartX = e.clientX;
            mouseDragging = true; mouseSwiped = false;
            item.classList.add('swiping');
        });

        document.addEventListener('mousemove', function(e) {
            if (!mouseDragging || !item.parentElement) return;
            mouseCurrentX = e.clientX;
            var dx = mouseCurrentX - mouseStartX;

            if (dx < -10) {
                var translateX = Math.max(dx, -item.offsetWidth * 0.8);
                item.style.transform = 'translateX(' + translateX + 'px)';
                item.style.opacity = Math.max(1 + dx / (item.offsetWidth * 1.5), 0.2);
                if (Math.abs(dx) > THRESHOLD && !mouseSwiped) {
                    mouseSwiped = true;
                    item.style.background = 'rgba(220,38,38,0.08)';
                    item.style.borderColor = 'rgba(220,38,38,0.3)';
                } else if (!mouseSwiped) {
                    item.style.background = '';
                    item.style.borderColor = '';
                }
            }
        });

        document.addEventListener('mouseup', function() {
            if (!mouseDragging) return;
            mouseDragging = false;
            item.classList.remove('swiping');
            var dx = mouseCurrentX - mouseStartX || 0;

            if (mouseSwiped && Math.abs(dx) > THRESHOLD) {
                performDeletePair(item, idx);
            } else {
                item.style.transform = '';
                item.style.opacity = '';
                item.style.background = '';
                item.style.borderColor = '';
            }
            mouseStartX = 0; mouseCurrentX = 0;
        });

        listEl.appendChild(item);
    });
}

// 切换到指定的对比组
function switchToPair(index) {
    if (index < 0 || index >= state.comparePairs.length) return;

    var pair = state.comparePairs[index];
    state.activePairIndex = index;

    // Restore design data to working state
    state.designImage = pair.designImg;
    state.designWidth = pair.dw;
    state.designHeight = pair.dh;
    state.selectedFrameName = pair.frameName;

    // Restore screenshot data
    if (pair.screenshotImg) {
        state.screenshotImage = pair.screenshotImg;
        state.screenshotWidth = pair.sw;
        state.screenshotHeight = pair.sh;
    } else {
        state.screenshotImage = null;
        state.screenshotWidth = 0;
        state.screenshotHeight = 0;
    }

    // Restore diff data and bugs if analyzed
    if (pair.diffData) {
        state.diffData = pair.diffData;
        state.bugs = [...(pair.bugs || [])];
        
        // Show results area with cached data
        document.getElementById('resultSection').classList.add('visible');
        document.getElementById('canvasPlaceholder').style.display = 'none';
        var cvs = document.getElementById('comparisonCanvas');
        cvs.style.display = 'block';

        // Re-render comparison from cached diffData
        renderComparison();

        // Restore stat values from this pair's diffData
        var dp = (pair.diffData.diffPixelCount / pair.diffData.totalPixels * 100).toFixed(2);
        document.getElementById('diffPercent').textContent = dp + '%';
        document.getElementById('diffPixels').textContent = formatNumber(pair.diffData.diffPixelCount);
        document.getElementById('similarityScore').textContent = (100 - parseFloat(dp)).toFixed(2) + '%';

        var compareBtn = document.getElementById('compareBtn');
        compareBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> 分析完成';
        compareBtn.disabled = false;

        enableMarkMode();
    } else {
        // No analysis yet for this pair
        resetComparisonResultsOnly();
    }

    // Update sidebar UI
    updateFrameCardUI(pair.frameName, pair.dw, pair.dh);
    
    // Ensure preview section is visible (critical for list display)
    document.getElementById('previewSection').style.display = '';

    // 单模式也用列表项渲染，隐藏全局上传区（列表项右侧已有内嵌上传按钮）
    document.getElementById('globalScreenshotSection').style.display = 'none';
    document.getElementById('singlePreviewRow').style.display = 'none';

    // Highlight in list
    refreshMultiPreviewList();

    checkReadyToCompare();
}

// 检查是否准备好进行对比
function checkReadyToCompare() {
    var compareBtn = document.getElementById('compareBtn');
    if (compareBtn) {
        compareBtn.disabled = !(state.designImage && state.screenshotImage);
    }
}

// 只重置对比结果（不重置图片数据）- 用于切换组时
function resetComparisonResultsOnly() {
    state.diffData = null;
    state.bugs = [];
    state.nextBugId = 1;

    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('canvasPlaceholder').style.display = 'flex';
    document.getElementById('comparisonCanvas').style.display = 'none';
    document.getElementById('bugMarkerOverlay').innerHTML = '';
    document.getElementById('bugCountBadge').textContent = '0';

    disableMarkMode();
    hideBugPanel();

    var compareBtn = document.getElementById('compareBtn');
    compareBtn.disabled = !(state.designImage && state.screenshotImage);
    compareBtn.innerHTML =
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>'
        + ' 开始差异分析';
}

function setupDragDrop() {
    const uploadArea = document.getElementById('uploadArea');
    ['dragenter', 'dragover'].forEach(function(name) {
        uploadArea.addEventListener(name, function(e) {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
    });
    ['dragleave', 'drop'].forEach(function(name) {
        uploadArea.addEventListener(name, function(e) {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
        });
    });
    uploadArea.addEventListener('drop', function(e) {
        if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
    });
}

function handleFileUpload(event) {
    if (event.target.files[0]) processFile(event.target.files[0]);
}

function processFile(file) {
    if (!file.type.match(/image\/(png|jpeg|webp)/)) {
        showStatus('请上传 PNG、JPG 或 WEBP 格式的图片', 'error');
        return;
    }
    // 如果没有选中的对，自动选择第一个
    if (state.activePairIndex < 0 && state.comparePairs.length > 0) {
        switchToPair(0);
    }
    if (state.activePairIndex >= 0) { processFileForPair(file, state.activePairIndex); }
    else { showStatus('请先捕获设计稿，再上传截图', 'error'); }
}

function processFileForPair(file, pairIdx) {
    if (!file.type.match(/image\/(png|jpeg|webp)/)) { showStatus('请上传 PNG、JPG 或 WEBP 格式的图片', 'error'); return; }

    var t0 = performance.now();
    console.log('[上传诊断] 开始处理文件:', file.name, '大小:', (file.size / 1024 / 1024).toFixed(2) + 'MB', '时间:', t0.toFixed(0) + 'ms');

    // 使用 createObjectURL 代替 FileReader - 速度提升 10-50 倍
    const objectURL = URL.createObjectURL(file);
    console.log('[上传诊断] createObjectURL 耗时:', (performance.now() - t0).toFixed(1) + 'ms');

    const img = new Image();

    img.onload = function() {
        var t1 = performance.now();
        console.log('[上传诊断] Image.onload 触发, 图片解码耗时:', (t1 - t0).toFixed(1) + 'ms', '尺寸:', img.width + 'x' + img.height);

        var pair = state.comparePairs[pairIdx];
        if (!pair) {
            URL.revokeObjectURL(objectURL);
            return;
        }

        // 清理旧的 Object URL（如果存在）
        if (pair.screenshotDataUrl && pair.screenshotDataUrl.startsWith('blob:')) {
            URL.revokeObjectURL(pair.screenshotDataUrl);
        }

        pair.screenshotDataUrl = objectURL;
        pair.sw = img.width;
        pair.sh = img.height;
        pair.screenshotImg = img;

        if (state.activePairIndex === pairIdx) {
            state.screenshotImage = img; state.screenshotWidth = img.width; state.screenshotHeight = img.height;

            // 清理预览区的旧 URL
            const prevPreview = document.getElementById('screenshotPreview').src;
            if (prevPreview && prevPreview.startsWith('blob:')) {
                URL.revokeObjectURL(prevPreview);
            }

            // 隐藏上传区，显示截图预览
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('screenshotPreview').src = objectURL;

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI-REL Design Review</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --bg-elevated: #14141c;
            --bg-surface: #1c1c28;
            --bg-hover: #242436;
            --border: #2a2a3c;
            --border-subtle: #222233;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.25);
            --accent-hover: #7c6ff0;
            --success: #00d68f;
            --success-dim: rgba(0, 214, 143, 0.12);
            --danger: #ff5c5c;
            --danger-dim: rgba(255, 92, 92, 0.12);
            --warning: #ffc048;
            --warning-dim: rgba(255, 192, 72, 0.12);
            --fg: #eaeaf0;
            --fg-secondary: #8888a0;
            --fg-muted: #55556a;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            font-size: 13px;
            line-height: 1.45;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg) 100%);
            flex-shrink: 0;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #a66cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            box-shadow: 0 2px 10px var(--accent-glow);
        }
        .header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            color: var(--accent);
        }
        .header-subtitle {
            font-size: 11px;
            color: var(--fg-muted);
            font-weight: 400;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* ===== SIDEBAR (LEFT) ===== */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            overflow-y: auto;
        }
        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .sidebar-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--fg-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-label::before {
            content: '';
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* Frame Selector Card */
        .frame-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 12px;
            border: 1px solid var(--border);
        }
        .frame-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-glow);
        }
        .frame-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }
        .frame-icon-sm {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent), #a66cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }
        .frame-name-text {
            font-weight: 500;
            font-size: 13px;
            overflow-x: auto;
            white-space: nowrap;
            min-width: 0;
        }
        .frame-name-text::-webkit-scrollbar { height: 0; } /* 隐藏滚动条，保留滚动能力 */
        .frame-dims {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--fg-secondary);
            margin-top: 4px;
        }
        .no-frame {
            color: var(--fg-muted);
            font-style: italic;
            font-size: 12px;
        }
        .btn-select-frame {
            width: 100%;
            margin-top: 10px;
            padding: 9px;
            background: var(--bg-surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius-sm);
            color: var(--fg-secondary);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.18s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-select-frame:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }
        .btn-select-frame.captured {
            border-style: solid;
            border-color: var(--success);
            color: var(--success);
            background: var(--success-dim);
        }
        .btn-select-frame:disabled {
            opacity: 0.6;
            cursor: default;
        }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }
        .upload-zone:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-glow);
            transform: scale(1.01);
        }
        .upload-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 8px;
            color: var(--fg-muted);
        }
        .upload-title {
            font-size: 13px;
            color: var(--fg-secondary);
            font-weight: 500;
        }
        .upload-hint {
            font-size: 11px;
            color: var(--fg-muted);
            margin-top: 4px;
        }
        input[type="file"] { display: none; }

        /* Mini Previews in Sidebar */
        .mini-preview-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .mini-preview-item {
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .mini-preview-img-wrap {
            aspect-ratio: 3/2;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--bg);
        }
        .mini-preview-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .mini-preview-label {
            font-size: 9px;
            text-align: center;
            padding: 3px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-design { color: var(--accent); }
        .badge-shot { color: var(--warning); }

        /* Compare Button */
        .btn-compare-wrapper {
            padding: 16px;
        }
        .btn-compare {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--success), #00b377);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 214, 143, 0.2);
        }
        .btn-compare:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(0, 214, 143, 0.35);
        }
        .btn-compare:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== CONTENT AREA (RIGHT) ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg);
            position: relative;
        }

        /* Canvas Container - the star of the show */
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 320px;
            position: relative;
            overflow: hidden;
        }
        /* Bug marking mode cursor */
        .canvas-container.mark-mode {
            cursor: crosshair;
        }
        .canvas-container.mark-mode .comparison-canvas {
            cursor: crosshair;
        }
        /* Bug marker overlay - covers entire canvas area, intercepts clicks */
        .bug-marker-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5;
        }
        .bug-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            cursor: pointer;
            z-index: 10;
        }
        .bug-dot-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--danger);
            border: 2.5px solid white;
            box-shadow: 0 2px 8px rgba(255,92,92,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            transition: transform 0.15s ease;
        }
        .bug-dot:hover .bug-dot-inner {
            transform: scale(1.25);
        }
        .canvas-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--fg-muted);
        }
        .canvas-placeholder svg {
            width: 64px;
            height: 64px;
            opacity: 0.25;
        }
        .canvas-placeholder p {
            font-size: 14px;
            max-width: 260px;
            text-align: center;
            line-height: 1.6;
        }
        .comparison-canvas {
            border-radius: var(--radius-md);
            box-shadow:
                0 0 0 1px var(--border),
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 60px var(--accent-glow);
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Results Bar (below canvas) */
        .results-bar {
            padding: 0 20px 16px;
            display: none;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            flex-shrink: 0;
        }
        .results-bar.visible {
            display: flex;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 10px;
        }
        .stat-box {
            flex: 1;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px;
            font-weight: 600;
            color: var(--accent);
        }
        .stat-val.danger { color: var(--danger); }
        .stat-val.warn { color: var(--warning); }
        .stat-lbl {
            font-size: 10px;
            color: var(--fg-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* View Toggle + Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .view-switcher {
            display: inline-flex;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            padding: 3px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .v-btn {
            padding: 6px 10px;
            border: none;
            background: transparent;
            color: var(--fg-muted);
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.18s ease;
            white-space: nowrap;
        }
        .v-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        /* Slider Group */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
        }
        .slider-group label {
            font-size: 10px;
            color: var(--fg-muted);
            white-space: nowrap;
            font-family: 'JetBrains Mono', monospace;
        }
        input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 6px var(--accent-glow);
        }

        /* Opacity quick-toggle button (single toggle) */
        .opacity-toggles {
            display: flex;
            margin-left: 4px;
        }
        .op-toggle {
            padding: 3px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-hover);
            color: var(--fg-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .op-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .slider-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--fg-secondary);
            min-width: 26px;
            text-align: right;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            flex: 1;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--fg-secondary);
            transition: all 0.18s ease;
        }
        .btn-action:hover {
            background: var(--bg-hover);
            color: var(--fg);
        }
        .btn-action.danger-style {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-dim);
        }
        .btn-action.danger-style:hover {
            background: rgba(255, 92, 92, 0.2);
        }
        /* Mark bug button active state */
        .btn-action.mark-active {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-dim);
            box-shadow: 0 0 12px rgba(255,92,92,0.3);
        }

        /* Bug Annotation Panel (popover) */
        .bug-panel {
            position: absolute;
            z-index: 200;
            width: 240px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,92,92,0.2);
            padding: 12px;
            display: none;
        }
        .bug-panel.visible {
            display: block;
            animation: panelIn 0.15s ease;
        }
        @keyframes panelIn { from { opacity:0; transform:translateY(-4px) scale(0.97); } to { opacity:1; transform:none; } }
        .bug-panel-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--danger);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .bug-panel-textarea {
            width: 100%;
            height: 60px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--fg);
            font-size: 12px;
            font-family: inherit;
            padding: 8px;
            resize: none;
            outline: none;
            display: block;
            margin-bottom: 8px;
        }
        .bug-panel-textarea:focus {
            border-color: var(--accent);
        }
        .bug-panel-actions {
            display: flex;
            gap: 6px;
        }
        .btn-bp {
            flex: 1;
            padding: 6px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.15s ease;
        }
        .btn-bp-save {
            background: var(--danger);
            color: white;
        }
        .btn-bp-save:hover { background: #ff4040; }
        .btn-bp-del {
            background: var(--bg-hover);
            color: var(--fg-muted);
            border: 1px solid var(--border);
        }
        .btn-bp-del:hover { color: var(--danger); border-color: var(--danger); }

        /* Bug List in sidebar */
        .bug-list-section {
            padding: 16px;
            border-bottom: 1px solid var(--border-subtle);
            max-height: 180px;
            overflow-y: auto;
            display: none;
        }
        .bug-list-section.visible { display: block; }
        .bug-list-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--fg-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .bug-count-badge {
            background: var(--danger);
            color: white;
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 600;
        }
        .bug-list-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 7px 8px;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            margin-bottom: 5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.12s ease;
        }
        .bug-list-item:hover {
            border-color: var(--danger-dim);
            background: var(--bg-hover);
        }
        .bug-list-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .bug-list-text {
            font-size: 11px;
            color: var(--fg-secondary);
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Status Toast - floating over canvas area */
        #statusMsg {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
            width: auto;
            max-width: 400px;
        }
        .status-msg {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--bg-elevated) !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
            animation: toastIn 0.2s ease, toastOut 0.3s ease 3.5s forwards;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        @keyframes toastIn { from { opacity:0; transform:translateY(-6px) scale(0.96); } to { opacity:1; transform:none; } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-4px); } }
        .status-msg.info {
            color: #b8b0ff !important;
            border-color: rgba(108, 92, 231, 0.35) !important;
        }
        .status-msg.success {
            color: var(--success) !important;
            border-color: rgba(0, 214, 143, 0.35) !important;
        }
        .status-msg.error {
            color: var(--danger) !important;
            border-color: rgba(255, 92, 92, 0.35) !important;
        }

        /* Footer */
        .footer {
            padding: 10px 20px;
            text-align: center;
            font-size: 10px;
            color: var(--fg-muted);
            border-top: 1px solid var(--border-subtle);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Hidden utility */
        [hidden], .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-brand">
        <div class="header-logo">U</div>
        <div>
            <h1>UI<span>-</span>REL <span class="header-subtitle">Design Review</span></h1>
        </div>
    </div>
</div>

<div class="main-layout">

    <!-- === LEFT SIDEBAR === -->
    <div class="sidebar">

        <!-- Frame Section -->
        <div class="sidebar-section">
            <div class="sidebar-label">设计稿来源</div>
            <div class="frame-card" id="frameSelector">
                <div class="no-frame">未选择 Frame</div>
            </div>
            <button class="btn-select-frame" id="selectFrameBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
                选择 Figma Frame

        <!-- Screenshot Upload -->
        <div class="sidebar-section">

            <div class="upload-zone" id="uploadArea">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17,8 12,3 7,8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <div class="upload-title">点击或拖拽上传截图</div>
                <div class="upload-hint">PNG / JPG / WEBP</div>

            <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">

        <!-- Mini Previews -->
        <div class="sidebar-section" id="previewSection" style="display:none;">

                    <div class="mini-preview-label badge-design">设计稿 <span id="designSize">-</span></div>
                </div>
                <div class="mini-preview-item">
                    <div class="mini-preview-img-wrap"><img class="mini-preview-img" id="screenshotPreview"></div>
                    <div class="mini-preview-label badge-shot">截图 <span id="screenshotSize">-</span></div>

        <!-- Bug List -->
        <div class="bug-list-section" id="bugListSection">
            <div class="bug-list-title">
                <span>Bug 标记</span>

            </div>
            <div id="bugListContainer"></div>
        </div>

        <!-- Compare Button -->
        <div style="flex:1;"></div>
        <div class="btn-compare-wrapper">
            <button class="btn-compare" id="compareBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>

    <!-- === RIGHT CONTENT AREA === -->
    <div class="content-area">

        <!-- Canvas Area -->

            <!-- Floating toast for status messages -->

                    <circle cx="32" cy="28" r="8"/>

                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

                    <div class="stat-val" id="diffPixels">0</div>
                    <div class="stat-lbl">像素数</div>
                </div>

                    <div class="stat-val" id="similarityScore">-</div>

            <div class="controls-row">
                <div class="view-switcher">
                    <button class="v-btn active" data-mode="overlay">叠加</button>

                    <label>灵敏度</label>

                    <span class="slider-val" id="sensitivityValue">30</span>
                </div>
                <div class="slider-group" id="opacityGroup">
                    <label>透明度</label>
                    <input type="range" id="opacitySlider" min="0" max="100" value="50">
                    <span class="slider-val" id="opacityValue">50%</span>
                    <button class="op-toggle" id="opToggleSwap" title="切换 0% / 100%">0/1</button>
                </div>

            <div class="action-row">
                <button class="btn-action" id="exportBtn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导出报告
                </button>
                <button class="btn-action danger-style" id="resetBtn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    重置
                </button>
            </div>
        </div>

    </div><!-- /content-area -->
</div><!-- /main-layout -->

<div class="footer">UI-REL Plugin v1.0 &middot; Design Review</div>


<script>
// ============================================
// UI-REL Design Review Plugin - UI Logic
// ============================================

let state = {
    designImage: null,
    screenshotImage: null,
    designWidth: 0,
    designHeight: 0,
    screenshotWidth: 0,
    screenshotHeight: 0,
    diffData: null,
    sensitivity: 30,
    opacity: 50,
    viewMode: 'overlay',
    selectedFrameName: '',
    // Bug marking system
    bugs: [],              // [{id, x, y, text, canvasX, canvasY}]
    nextBugId: 1,
    isMarkMode: false,
    editingBugId: null,   // currently editing in panel
    // Canvas display scale for coordinate conversion
    _canvasScaleX: 1,
    _canvasScaleY: 1,
    _canvasOffsetX: 0,
    _canvasOffsetY: 0
};

window.addEventListener('message', (event) => {
    let raw = event.data;
    let msg = raw && raw.pluginMessage ? raw.pluginMessage : {};
    if (msg.pluginMessage && !msg.type) msg = msg.pluginMessage;

    const type = msg ? msg.type : undefined;
    const data = msg ? msg.data : undefined;

    console.log('[UI] received message:', type, data ? 'hasData' : 'noData');
    if (!type) return;

    switch (type) {
        case 'design-captured':
            handleDesignCaptured(data);
            break;
        case 'error':
            showStatus(data.message, 'error');
            break;
        case 'log':
            console.log('[Plugin]', data.message);
            break;
    }
});

document.addEventListener('DOMContentLoaded', () => {
    setupDragDrop();

    document.getElementById('selectFrameBtn').addEventListener('click', selectFrame);
    document.getElementById('uploadArea').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', handleFileUpload);
    document.getElementById('compareBtn').addEventListener('click', startComparison);
    document.getElementById('exportBtn').addEventListener('click', exportResult);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    document.querySelectorAll('.v-btn').forEach(btn => {
        btn.addEventListener('click', () => setViewMode(btn.dataset.mode));
    });

    document.getElementById('sensitivitySlider').addEventListener('input', (e) => updateSensitivity(e.target.value));
    document.getElementById('opacitySlider').addEventListener('input', (e) => updateOpacity(e.target.value));

    document.getElementById('opToggleSwap').addEventListener('click', toggleOpacity);

    // Bug marking system
    // markBugBtn removed - direct click-to-mark after analysis
    // Mark mode is auto-enabled when results are shown
    document.getElementById('bugPanelSave').addEventListener('click', saveBugAnnotation);
    document.getElementById('bugPanelDel').addEventListener('click', deleteBugFromPanel);
    document.getElementById('bugPanelCancel').addEventListener('click', hideBugPanel);

    // Click on container (covers both canvas and overlay) for bug marking
    var containerEl = document.getElementById('canvasContainer');
    containerEl.addEventListener('click', onContainerClick);

    parent.postMessage({ pluginMessage: { type: 'request-current-selection' } }, '*');
});

function selectFrame() {
    showStatus('请在 Figma 中选择一个 Frame...', 'info');
    parent.postMessage({ pluginMessage: { type: 'select-frame' } }, '*');
}

function handleDesignCaptured(data) {
    if (!data || !data.imageDataUrl) {
        showStatus('未能获取设计稿图片，请确认已选中有效的 Frame', 'error');
        return;
    }

    const img = new Image();
    img.onload = () => {
        state.designImage = img;
        state.designWidth = img.width;
        state.designHeight = img.height;
        state.selectedFrameName = data.frameName || 'Selected Frame';

        document.getElementById('frameSelector').className = 'frame-card active';
        document.getElementById('frameSelector').innerHTML =
            '<div class="frame-info-row">' +
            '<div class="frame-icon-sm">F</div>' +
            '<div><div class="frame-name-text">' + escapeHtml(state.selectedFrameName) + '</div>' +
            '<div class="frame-dims">' + img.width + ' x ' + img.height + ' px</div></div>' +
            '</div>';

        const btn = document.getElementById('selectFrameBtn');
        btn.className = 'btn-select-frame captured';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> 已捕获设计稿';
        btn.disabled = true;

        document.getElementById('designPreview').src = data.imageDataUrl;
        document.getElementById('designSize').textContent = img.width + '\u00d7' + img.height;
        document.getElementById('previewSection').style.display = 'block';

        showStatus('\u6210\u529f\u6355\u83b7\u8bbe\u8ba1\u7a3f: ' + state.selectedFrameName + ' (' + img.width + '\u00d7' + img.height + ')', 'success');
        checkReadyToCompare();
    };
    img.onerror = function(e) { console.error('[UI] Image load error:', e); };
    img.src = data.imageDataUrl;
}

function setupDragDrop() {
    const uploadArea = document.getElementById('uploadArea');
    ['dragenter', 'dragover'].forEach(function(name) {
        uploadArea.addEventListener(name, function(e) {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
    });
    ['dragleave', 'drop'].forEach(function(name) {
        uploadArea.addEventListener(name, function(e) {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
        });
    });
    uploadArea.addEventListener('drop', function(e) {
        if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
    });
}

function handleFileUpload(event) {
    if (event.target.files[0]) processFile(event.target.files[0]);
}

function processFile(file) {
    if (!file.type.match(/image\/(png|jpeg|webp)/)) {
        showStatus('请上传 PNG、JPG 或 WEBP 格式的图片', 'error');
        return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            state.screenshotImage = img;
            state.screenshotWidth = img.width;
            state.screenshotHeight = img.height;
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('screenshotPreview').src = e.target.result;
            document.getElementById('screenshotSize').textContent = img.width + '\u00d7' + img.height;
            showStatus('\u622a\u56fe\u4e0a\u4f20\u6210\u529f (' + img.width + '\u00d7' + img.height + ')', 'success');
            checkReadyToCompare();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function checkReadyToCompare() {
    if (state.designImage && state.screenshotImage) {
        document.getElementById('compareBtn').disabled = false;
    }
}

function startComparison() {
    if (!state.designImage || !state.screenshotImage) {
        showStatus('请先完成设计稿选择和截图上传', 'error');
        return;
    }

    if (state.designWidth !== state.screenshotWidth || state.designHeight !== state.screenshotHeight) {
        showStatus(
            '\u5c3a\u5bf8\u4e0d\u4e00\u81f4\uff01\u8bbe\u8ba1\u7a3f: ' + state.designWidth + '\u00d7' + state.designHeight +
            '\uff0c\u622a\u56fe: ' + state.screenshotWidth + '\u00d7' + state.screenshotHeight +
            '\u3002\u8bf7\u4e0a\u4f20\u76f8\u540c\u5c3a\u5bf8\u7684\u622a\u56fe\u3002',
            'error'
        );
        return;
    }

    const btn = document.getElementById('compareBtn');
    btn.innerHTML = '<span class="spinner"></span> 分析中...';
    btn.disabled = true;

    setTimeout(function() {
        try {
            performComparison();
            document.getElementById('resultSection').classList.add('visible');

            // Show canvas, hide placeholder
            document.getElementById('canvasPlaceholder').style.display = 'none';
            const cvs = document.getElementById('comparisonCanvas');
            cvs.style.display = 'block';
            renderComparison();

            btn.innerHTML =
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>' +
                ' 分析完成';
            showStatus('\u5dee\u5f02\u5206\u6790\u5b8c\u6210\uff01\u53ef\u5207\u6362\u67e5\u770b\u6a21\u5f0f\u8fdb\u884c\u5bf9\u6bd4', 'success');
            enableMarkMode();
        } catch (err) {
            console.error(err);
            showStatus('\u5206\u6790\u51fa\u9519: ' + err.message, 'error');
            btn.disabled = false;
            btn.innerHTML =
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>' +
                ' 开始差异分析';
        }
    }, 100);
}

function performComparison() {
    var dc = createCanvas(state.designImage);
    var sc = createCanvas(state.screenshotImage);
    var targetW = state.designWidth;
    var targetH = state.designHeight;
    var designCtx = dc.ctx;
    var screenshotCtx = sc.ctx;
    var designData = designCtx.getImageData(0, 0, targetW, targetH);
    var screenshotData = screenshotCtx.getImageData(0, 0, targetW, targetH);

    var diffPixels = new Uint8ClampedArray(targetW * targetH * 4);
    var maxDiffValue = 0, diffPixelCount = 0;
    var threshold = state.sensitivity;
    var totalPixels = targetW * targetH;

    for (var i = 0; i < totalPixels; i++) {
        var idx = i * 4;
        var dr = designData.data[idx] - screenshotData.data[idx];
        var dg = designData.data[idx+1] - screenshotData.data[idx+1];
        var db = designData.data[idx+2] - screenshotData.data[idx+2];
        var dv = Math.sqrt(dr*dr + dg*dg + db*db);
        if (dv >= threshold) {
            diffPixelCount++;
            maxDiffValue = Math.max(maxDiffValue, dv);
        }
        diffPixels[idx] = dv; diffPixels[idx+1] = dv; diffPixels[idx+2] = dv;
        diffPixels[idx+3] = dv >= threshold ? 255 : 0;
    }

    state.diffData = {
        pixels: diffPixels, width: targetW, height: targetH,
        designImageData: designData, screenshotImageData: screenshotData,
        totalPixels: totalPixels, diffPixelCount: diffPixelCount,
        maxDiffValue: Math.max(maxDiffValue, 1), threshold: threshold
    };

    var dp = (diffPixelCount / totalPixels * 100).toFixed(2);
    var percentEl = document.getElementById('diffPercent');
    percentEl.textContent = dp + '%';
    if (parseFloat(dp) >= 15) percentEl.className = 'stat-val danger';
    else if (parseFloat(dp) >= 5) percentEl.className = 'stat-val warn';
    else percentEl.className = 'stat-val';
    document.getElementById('diffPixels').textContent = formatNumber(diffPixelCount);
    document.getElementById('similarityScore').textContent = (100 - parseFloat(dp)).toFixed(2) + '%';
}

function renderComparison() {
    if (!state.diffData) return;
    var canvas = document.getElementById('comparisonCanvas');
    var container = document.getElementById('canvasContainer');
    var w = state.diffData.width, h = state.diffData.height;

    if (state.viewMode === 'sidebyside') {
        // Side-by-side: two full images side by side (2x width)
        var gap = 6; // gap between images
        var availW = container.clientWidth - 40;
        var availH = container.clientHeight - 40;
        availW = Math.max(availW, 400);
        availH = Math.max(availH, 200);
        // Each image gets half the available width minus the gap
        var singleW = Math.floor((availW - gap) / 2);
        var sc = Math.min(singleW / w, availH / h, 1);
        var imgDrawW = Math.max(1, Math.round(w * sc));
        var imgDrawH = Math.max(1, Math.round(h * sc));

        // Store scale for coordinate conversion (left image)
        state._canvasScaleX = sc;
        state._canvasScaleY = sc;
        state._canvasOffsetX = 0;
        state._canvasOffsetY = 0;

        canvas.width = imgDrawW * 2 + gap;
        canvas.height = imgDrawH;

        var ctx = canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Left: design image
        var dOff = document.createElement('canvas'); dOff.width=w; dOff.height=h;
        dOff.getContext('2d').putImageData(state.diffData.designImageData, 0, 0);
        ctx.drawImage(dOff, 0, 0, imgDrawW, imgDrawH);

        // Right: screenshot image
        var sOff = document.createElement('canvas'); sOff.width=w; sOff.height=h;
        sOff.getContext('2d').putImageData(state.diffData.screenshotImageData, 0, 0);
        ctx.drawImage(sOff, imgDrawW + gap, 0, imgDrawW, imgDrawH);

        // Labels
        ctx.font='12px Outfit,sans-serif'; ctx.fillStyle='#8888a0';
        ctx.textAlign='center'; ctx.fillText('\u8bbe\u8ba1\u7a3f', imgDrawW/2, 18);
        ctx.fillText('\u5b9e\u673a\u622a\u56fe', imgDrawW + gap + imgDrawW/2, 18);
    } else {
        // All other modes: single image
        var availW = container.clientWidth - 40;
        var availH = container.clientHeight - 40;
        availW = Math.max(availW, 200);
        availH = Math.max(availH, 200);
        var sc = Math.min(availW / w, availH / h, 1);

        // Store scale for coordinate conversion
        state._canvasScaleX = sc;
        state._canvasScaleY = sc;
        state._canvasOffsetX = 0;
        state._canvasOffsetY = 0;

        canvas.width = Math.max(1, Math.round(w * sc));
        canvas.height = Math.max(1, Math.round(h * sc));

        var offscreen = document.createElement('canvas');
        offscreen.width = w;
        offscreen.height = h;
        var offCtx = offscreen.getContext('2d');

        switch (state.viewMode) {
            case 'heatmap':    renderHeatmap(offCtx, w, h);    break;
            case 'overlay':    renderOverlay(offCtx, w, h);    break;
            case 'diffonly':   renderDiffOnly(offCtx, w, h);   break;
        }

        var ctx = canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.drawImage(offscreen, 0, 0, canvas.width, canvas.height);
    }

    // Refresh overlay dots (markers shown as DOM elements over the canvas)
    refreshBugDots();
}

function drawBugMarkersOnCanvas() {
    if (!state.bugs.length) return;
    var canvas = document.getElementById('comparisonCanvas');
    var ctx = canvas.getContext('2d');

    state.bugs.forEach(function(bug) {
        var dx = bug.x * state._canvasScaleX;
        var dy = bug.y * state._canvasScaleY;

        // Outer glow
        ctx.beginPath();
        ctx.arc(dx, dy, 14, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,92,92,0.25)';
        ctx.fill();

        // Red circle
        ctx.beginPath();
        ctx.arc(dx, dy, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#ff5c5c';
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Number
        ctx.font = 'bold 10px JetBrains Mono, monospace';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('' + bug.id, dx, dy + 0.5);
    });
}

function renderHeatmap(ctx, w, h) {
    var d = state.diffData;
    ctx.putImageData(d.designImageData, 0, 0);
    var heat = ctx.createImageData(w, h);
    for (var i = 0; i < w*h; i++) {
        var idx = i*4, val = d.pixels[idx];
        if (val >= d.threshold) {
            var intensity = Math.min(val/d.maxDiffValue, 1);
            var c = getHeatmapColor(intensity);
            heat.data[idx]=c[0]; heat.data[idx+1]=c[1]; heat.data[idx+2]=c[2];
            heat.data[idx+3] = Math.floor(intensity * 200);
        }
    }
    ctx.globalAlpha=0.85; ctx.globalCompositeOperation='screen';
    ctx.putImageData(heat, 0, 0);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
}

function renderOverlay(ctx, w, h) {
    var d = state.diffData;
    ctx.putImageData(d.designImageData, 0, 0);
    ctx.globalAlpha = state.opacity/100;
    var tmp = document.createElement('canvas'); tmp.width=w; tmp.height=h;
    tmp.getContext('2d').putImageData(d.screenshotImageData, 0, 0);
    ctx.drawImage(tmp, 0, 0); ctx.globalAlpha=1;
}

function renderDiffOnly(ctx, w, h) {
    var d = state.diffData;
    var bg = new Uint8ClampedArray(d.designImageData.data.length);
    for (var i = 0; i < bg.length; i += 4) {
        var src = d.designImageData.data;
        var g = src[i] * 0.299 + src[i + 1] * 0.587 + src[i + 2] * 0.114;
        bg[i] = g * 0.5; bg[i + 1] = g * 0.5; bg[i + 2] = g * 0.5;
        bg[i + 3] = 255;
    }
    ctx.putImageData(new ImageData(bg, w, h), 0, 0);
    var hl = ctx.createImageData(w, h);
    for (var i=0;i<w*h;i++) {
        var idx=i*4, val=d.pixels[idx];
        if (val>=d.threshold) {
            var c=getHeatmapColor(Math.min(val/d.maxDiffValue,1));
            hl.data[idx]=c[0]; hl.data[idx+1]=c[1]; hl.data[idx+2]=c[2]; hl.data[idx+3]=230;
        }
    }
    ctx.globalCompositeOperation='screen'; ctx.putImageData(hl, 0, 0);
    ctx.globalCompositeOperation='source-over';
}

function getHeatmapColor(t) {
    var colors=[[0,0,128],[0,100,200],[0,200,200],[0,220,120],[60,220,60],[180,220,40],[240,180,20],[245,100,30],[240,40,40],[180,10,40]];
    var idx=t*(colors.length-1), lo=Math.floor(idx), hi=Math.min(lo+1,colors.length-1), f=idx-lo;
    return [Math.round(colors[lo][0]+(colors[hi][0]-colors[lo][0])*f),
            Math.round(colors[lo][1]+(colors[hi][1]-colors[lo][1])*f),
            Math.round(colors[lo][2]+(colors[hi][2]-colors[lo][2])*f)];
}

// Analysis completed -> enable direct click-to-mark on canvas
function enableMarkMode() {

function onContainerClick(e) {
    if (!state.diffData) return;

    // If clicked on a bug dot or the annotation panel itself, do nothing (let the dot's handler deal with it)
    var target = e.target;
    if (target.closest('.bug-dot') || target.closest('#bugPanel') || target.closest('.bug-panel')) {
        return;
    }

    // If a panel is currently open, close it first (don't create bug on accidental click)
    if (state.editingBugId !== null) {
        hideBugPanel();
        return;
    }

    // Get click position relative to canvas
    var canvasEl = document.getElementById('comparisonCanvas');
    var rect = canvasEl.getBoundingClientRect();
    // Click position relative to canvas element
    var clickX = e.clientX - rect.left;
    var clickY = e.clientY - rect.top;

    // Ignore clicks outside canvas bounds
    if (clickX < 0 || clickX > rect.width || clickY < 0 || clickY > rect.height) return;

    // Convert to original image coordinates
    var imgX = Math.round(clickX / state._canvasScaleX);
    var imgY = Math.round(clickY / state._canvasScaleY);

    // Clamp to image bounds
    imgX = Math.max(0, Math.min(imgX, state.diffData.width));
    imgY = Math.max(0, Math.min(imgY, state.diffData.height));

    // Create new bug
    var bug = {
        id: state.nextBugId++,
        x: imgX,
        y: imgY,
        text: '',
        displayX: clickX,
        displayY: clickY
    };
    state.bugs.push(bug);

    // Show annotation panel at this position
    showBugPanel(bug, clickX, clickY);
}

function showBugPanel(bug, screenX, screenY) {
    state.editingBugId = bug.id;
    var panel = document.getElementById('bugPanel');
    var container = document.getElementById('canvasContainer');

    document.getElementById('bugPanelNum').textContent = bug.id;
    document.getElementById('bugPanelText').value = bug.text || '';
    document.getElementById('bugPanelDel').style.display = bug.text ? 'flex' : 'none';

    // Position the panel near the click, but keep within container bounds
    var cRect = container.getBoundingClientRect();
    var panelW = 240, panelH = 150; // approximate
    var left = screenX + 16;
    var top = screenY - 20;
    if (left + panelW > cRect.width - 10) left = screenX - panelW - 16;
    if (top + panelH > cRect.height - 10) top = screenY - panelH + 30;
    if (left < 5) left = 5;
    if (top < 5) top = 5;

    panel.style.left = left + 'px';
    panel.style.top = top + 'px';
    panel.classList.add('visible');

    // Focus textarea
    setTimeout(function() { document.getElementById('bugPanelText').focus(); }, 50);
}

function hideBugPanel() {
    document.getElementById('bugPanel').classList.remove('visible');
    state.editingBugId = null;
}

function saveBugAnnotation() {
    var text = document.getElementById('bugPanelText').value.trim();
    var bug = state.bugs.find(function(b) { return b.id === state.editingBugId; });
    if (!bug) return;

    if (!text) {
        // No description — for new bugs delete, for existing bugs restore original text
        if (bug.text) {
            // Editing existing bug: restore original text, cancel edit
            document.getElementById('bugPanelText').value = bug.text;
            showStatus('描述不能为空，已恢复原文', 'error');
            return;
        } else {
            // New bug with no text: delete it
            deleteBugById(state.editingBugId);
            hideBugPanel();
            showStatus('已取消标记（无描述）', 'info');
            return;
        }
    }

    bug.text = text;
    hideBugPanel();
    refreshBugList();
    refreshBugDots();
    renderComparison();

    showStatus('\u5df2\u4fdd\u5b58 Bug #' + state.editingBugId + ': ' + text, 'success');
}

function deleteBugById(bugId) {
    var idx = state.bugs.findIndex(function(b) { return b.id === bugId; });
    if (idx !== -1) {
        state.bugs.splice(idx, 1);
        // Renumber remaining bugs: reassign sequential ids starting from 1
        for (var i = 0; i < state.bugs.length; i++) {
            state.bugs[i].id = i + 1;
        }
        // Update nextBugId to be max+1
        state.nextBugId = state.bugs.length + 1;
    }
}

function deleteBugFromPanel() {
    if (!state.editingBugId) return;
    deleteBugById(state.editingBugId);
    hideBugPanel();
    refreshBugList();
    refreshBugDots();
    renderComparison();
    showStatus('\u5df2\u5220\u9664 Bug #' + state.editingBugId, 'info');
}

function refreshBugDots() {
    var overlay = document.getElementById('bugMarkerOverlay');
    overlay.innerHTML = '';

    if (state.bugs.length === 0) {
        var section = document.getElementById('bugListSection');
        section.classList.remove('visible');
        document.getElementById('bugCountBadge').textContent = '0';
        return;
    }

    var canvasEl = document.getElementById('comparisonCanvas');
    var rect = canvasEl.getBoundingClientRect();
    var containerRect = document.getElementById('canvasContainer').getBoundingClientRect();

    // Offset of canvas within container
    var offsetX = rect.left - containerRect.left;
    var offsetY = rect.top - containerRect.top;

    state.bugs.forEach(function(bug) {
        var dotX = offsetX + bug.x * state._canvasScaleX;
        var dotY = offsetY + bug.y * state._canvasScaleY;

        var dot = document.createElement('div');
        dot.className = 'bug-dot';
        dot.style.left = dotX + 'px';
        dot.style.top = dotY + 'px';
        dot.dataset.bugId = bug.id;
        dot.innerHTML = '<div class="bug-dot-inner">' + bug.id + '</div>';
        dot.title = 'Bug #' + bug.id + ': ' + (bug.text || '(点击编辑)');
        dot.addEventListener('click', function(e) {
            e.stopPropagation(); // prevent bubbling to canvas
            e.preventDefault();
            openBugForEdit(bug.id, dotX, dotY);
        });
        overlay.appendChild(dot);
    });

    // Show bug list section
    var section = document.getElementById('bugListSection');
    section.classList.add('visible');
    document.getElementById('bugCountBadge').textContent = state.bugs.length;
}

function openBugForEdit(bugId, screenX, screenY) {
    var bug = state.bugs.find(function(b) { return b.id === bugId; });
    if (!bug) return;
    // Use stored display position or calculate fresh
    if (screenX === undefined) {
        var canvasEl = document.getElementById('comparisonCanvas');
        var rect = canvasEl.getBoundingClientRect();
        var containerRect = document.getElementById('canvasContainer').getBoundingClientRect();
        var offsetX = rect.left - containerRect.left;
        var offsetY = rect.top - containerRect.top;
        screenX = offsetX + bug.x * state._canvasScaleX;
        screenY = offsetY + bug.y * state._canvasScaleY;
    }
    showBugPanel(bug, screenX, screenY);
}

function refreshBugList() {
    var container = document.getElementById('bugListContainer');
    container.innerHTML = '';
    state.bugs.forEach(function(bug) {
        var item = document.createElement('div');
        item.className = 'bug-list-item';
        item.innerHTML =
            '<div class="bug-list-num">' + bug.id + '</div>' +
            '<div class="bug-list-text">' + escapeHtml(bug.text || '(\u65e0\u63cf\u8ff0)') + '</div>';
        item.addEventListener('click', function() { openBugForEdit(bug.id); });
        container.appendChild(item);
    });
    document.getElementById('bugCountBadge').textContent = state.bugs.length;
}

function resetAll() {
    state={designImage:null,screenshotImage:null,designWidth:0,designHeight:0,screenshotWidth:0,screenshotHeight:0,diffData:null,sensitivity:30,opacity:50,viewMode:'overlay',selectedFrameName:'',bugs:[],nextBugId:1,isMarkMode:false,editingBugId:null,_canvasScaleX:1,_canvasScaleY:1};
    document.getElementById('frameSelector').className = 'frame-card';
    document.getElementById('frameSelector').innerHTML='<div class="no-frame">\u672a\u9009\u62e9 Frame</div>';
    var btn = document.getElementById('selectFrameBtn');
    btn.className = 'btn-select-frame';
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg> \u9009\u62e9 Figma Frame';
    btn.disabled=false;
    document.getElementById('uploadArea').style.display='block';
    document.getElementById('fileInput').value='';
    document.getElementById('previewSection').style.display='none';
    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('canvasPlaceholder').style.display = 'flex';
    document.getElementById('comparisonCanvas').style.display = 'none';

    // Reset bug marking
    exitMarkMode();
    hideBugPanel();
    document.getElementById('bugListSection').classList.remove('visible');
    document.getElementById('bugListContainer').innerHTML = '';
    document.getElementById('bugMarkerOverlay').innerHTML = '';
    document.getElementById('bugCountBadge').textContent = '0';
    document.getElementById('sensitivitySlider').value=30; document.getElementById('sensitivityValue').textContent='30';
    document.getElementById('opacitySlider').value=50; document.getElementById('opacityValue').textContent='50%';
    document.querySelectorAll('.v-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mode==='heatmap');});
    // no cycle index to reset anymore
    // Restore opacity group visibility for overlay mode
    var opGroup = document.getElementById('opacityGroup');
    if (opGroup) opGroup.style.display = 'flex';

    // Disable mark mode
    disableMarkMode();
    hideBugPanel();

    showStatus('\u5df2\u91cd\u7f6e\uff0c\u53ef\u4ee5\u91cd\u65b0\u5f00\u59cb\u8d70\u67e5','info');
    parent.postMessage({pluginMessage:{type:'reset'}},'*');
}

function createCanvas(img) {
    var c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight;
    c.getContext('2d').drawImage(img,0,0); return { canvas: c, ctx: c.getContext('2d') };
}
function resizeCanvas(src, tw, th) {
    var c=document.createElement('canvas'); c.width=tw; c.height=th;
    c.getContext('2d').drawImage(src,0,0,tw,th); return c;
}
function formatNumber(n) { if(n>=1e6)return(n/1e6).toFixed(2)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return ''+n; }

function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

function showStatus(msg, type) {
    var el=document.getElementById('statusMsg'), icons={info:'<svg width="14"height="14"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2"><circle cx="12"cy="12"r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',success:'<svg width="14"height="14"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>',error:'<svg width="14"height="14"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2"><circle cx="12"cy="12"r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>'};
    el.innerHTML='<div class="status-msg '+type+'">'+icons[type]+msg+'</div>';
    // Auto-remove after CSS animation completes (~4s)
    if(type!=='error') setTimeout(function(){el.innerHTML='';},4000);
}
